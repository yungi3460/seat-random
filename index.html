<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>우리반 자리배치</title>

<style>

body{
background:linear-gradient(135deg,#6a85ff,#bac8ff);
font-family:sans-serif;
text-align:center;
color:white;
}

h1{
font-size:60px;
margin:20px;
}

.row{
display:flex;
justify-content:center;
margin:10px;
}

.seat{
width:120px;
height:60px;
background:white;
color:black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-weight:bold;
}

button{
padding:15px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.start{
background:#00d084;
color:white;
}

.stop{
background:#ff4d4d;
color:white;
}

</style>
</head>

<body>

<h1>🎲 우리반 자리배치</h1>

<div id="seats"></div>

<button class="start" onclick="startRandom()">START</button>
<button class="stop" onclick="stopRandom()">STOP</button>

<script>

const students = [
"1번","2번","3번","4번","5번",
"6번","7번","8번","9번","10번",
"11번","12번","13번","14번","15번",
"16번","17번","18번","19번","20번",
"21번","22번","23번","24번","25번",
"26번","27번"
]

const layout = [5,6,5,6,5]

let seats = []
let interval

function createSeats(){

const container = document.getElementById("seats")

layout.forEach(num=>{

let row=document.createElement("div")
row.className="row"

for(let i=0;i<num;i++){

let seat=document.createElement("div")
seat.className="seat"
seat.innerText="?"

row.appendChild(seat)
seats.push(seat)

}

container.appendChild(row)

})

}

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

function startRandom(){

interval=setInterval(()=>{

let temp=[...students]
shuffle(temp)

seats.forEach((seat,i)=>{
seat.innerText=temp[i]
})

},100)

}

function stopRandom(){
clearInterval(interval)
}

createSeats()

</script>

</body>
</html>
